<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Crossy options</title>
  </head>
  <body>
    <main style="max-width: 480px; padding: 8px; font-family: system-ui">
      <h1>Crossy</h1>
      <p>
        Nothing to configure: the extension talks to Crossy production and you
        sign in from the popup.
      </p>
      <h2>Advanced (local development)</h2>
      <p>
        Overrides for running against a local stack. Leave every field empty for
        production.
      </p>
      <p>
        <label>
          API base override<br />
          <input id="apiBaseUrl" type="url" size="40" />
        </label>
      </p>
      <p>
        <label>
          Auth base override (Supabase)<br />
          <input id="authBaseUrl" type="url" size="40" />
        </label>
      </p>
      <p>
        <label>
          Publishable key override<br />
          <input id="publishableKey" type="text" size="40" />
        </label>
      </p>
      <p>
        <button id="save">Save</button>
        <button id="reset">Reset to production defaults</button>
      </p>
      <p id="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
