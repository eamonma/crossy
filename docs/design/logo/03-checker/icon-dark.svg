<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Direction 03, The Checker. Observatory ground: blocks recessed darker than
       the canvas, cells lit, exactly as the board draws itself at night. -->
  <rect width="1024" height="1024" rx="230" fill="#121118"/>
  <defs>
    <clipPath id="tile"><rect x="232" y="232" width="560" height="560" rx="48"/></clipPath>
  </defs>
  <rect x="232" y="232" width="560" height="560" rx="48" fill="#201F27"/>
  <g clip-path="url(#tile)">
    <rect x="512" y="232" width="280" height="280" fill="#0A0910"/>
    <rect x="232" y="512" width="280" height="280" fill="#0A0910"/>
  </g>
  <rect x="232" y="232" width="560" height="560" rx="48" fill="none" stroke="#2C2B34" stroke-width="8"/>
</svg>
