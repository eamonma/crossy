<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Direction 03, The Checker. The smallest true crossword fragment: a 2x2 tile,
       two open cells and two ink blocks on the diagonal, held as one object.
       Studio ground; block token 0x1B1A17, not pure black, per Grounds.swift. -->
  <rect width="1024" height="1024" rx="230" fill="#F2F1EC"/>
  <defs>
    <clipPath id="tile"><rect x="232" y="232" width="560" height="560" rx="48"/></clipPath>
  </defs>
  <rect x="232" y="232" width="560" height="560" rx="48" fill="#FFFFFF"/>
  <g clip-path="url(#tile)">
    <rect x="512" y="232" width="280" height="280" fill="#1B1A17"/>
    <rect x="232" y="512" width="280" height="280" fill="#1B1A17"/>
  </g>
  <rect x="232" y="232" width="560" height="560" rx="48" fill="none" stroke="#D9D6CD" stroke-width="8"/>
</svg>
