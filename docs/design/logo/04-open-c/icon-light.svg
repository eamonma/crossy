  <path d="M 734.15 698.41 A 290 290 0 1 1 734.15 325.59"
        fill="none" stroke="#1D1B18" stroke-width="150" stroke-linecap="round"/>
  <rect x="727" y="437" width="150" height="150" rx="24" fill="#978365"/>
</svg>
