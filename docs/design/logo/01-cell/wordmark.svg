<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 32" width="92" height="32">
  <!-- Direction 01 sidebar lockup. Mark 24, gap 6, display serif semibold 18
       (the recipe AppShell/primitives already carry). Transparent cell fill so the
       mark sits on any panel; ink flips with the scheme. -->
  <style>
    .ink { fill: #1D1B18; }
    .ink-stroke { stroke: #1D1B18; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #EDEAE2; }
      .ink-stroke { stroke: #EDEAE2; }
    }
  </style>
  <rect class="ink-stroke" x="2.25" y="5.25" width="21.5" height="21.5" rx="4.5" fill="none" stroke-width="2.5"/>
  <text class="ink" x="13" y="20.5" text-anchor="middle"
        font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="700">C</text>
  <text class="ink" x="30" y="22" font-family="harfang-pro, Newsreader, Georgia, 'Times New Roman', serif"
        font-size="18" font-weight="600" letter-spacing="-0.00625em">Crossy</text>
</svg>
