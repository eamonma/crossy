<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Direction 02 favicon. Pure geometry, no type, so it is the strongest shrinker
       in the set: at 16px the bars hold and the gold cell stays a warm pixel. -->
  <style>
    .ink { fill: #1D1B18; }
    @media (prefers-color-scheme: dark) { .ink { fill: #EDEAE2; } }
  </style>
  <rect class="ink" x="2" y="12.5" width="28" height="7" rx="1.6"/>
  <rect class="ink" x="9" y="5.5" width="7" height="21" rx="1.6"/>
  <rect x="10.5" y="14" width="4" height="4" rx="1" fill="#978365"/>
</svg>
