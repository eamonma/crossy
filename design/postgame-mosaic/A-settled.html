<!doctype html>
<!--
  Direction A, frame 2: THE SETTLED SURFACE (the revisit).
  You reopen a completed room days later. No confetti, no card thrown in your face. The
  board sits calm, but it keeps a quiet memory of the mosaic: a low-tint attribution wash
  under the ink, so the artifact is still legible as "who did what" without shouting. A
  standing rail names the solve (masthead), the frozen facts, and the full ledger. This
  is the nonephemeral anchor a retrospective can grow around: the rail is where a
  timeline, a clue heatmap, a rematch button would land later.
  Ships on today's data: the reconnect snapshot carries per-cell `by`.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Crossy — settled room (A)</title>
    <link rel="stylesheet" href="./tokens.css" />
    <script src="./grid-inline.js"></script>
    <style>
      .stage {
        width: 1440px;
        height: 900px;
        display: grid;
        grid-template-columns: 1fr 380px;
        background: var(--color-background);
        overflow: hidden;
      }
      .panel {
        margin: 16px;
        margin-right: 8px;
        background: var(--color-panel);
        border: 1px solid var(--color-border-strong);
        border-radius: var(--radius-3);
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--color-border);
      }
      .toolbar .title {
        font-family: var(--font-display);
        font-size: var(--text-5);
        font-weight: 500;
      }
      .toolbar .done {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: var(--text-2);
        font-weight: 500;
        color: var(--color-green-11);
      }
      .toolbar .check {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: var(--color-green-11);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 11px;
      }
      .board-stage {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 36px;
        min-height: 0;
      }
      .board-fit {
        width: min(100%, calc(15 * 46px));
      }

      /* the standing revisit rail: the artifact's home surface */
      .rail {
        margin: 16px;
        margin-left: 8px;
        background: var(--color-panel-feature);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-3);
        box-shadow: var(--shadow-sm);
        padding: 28px 24px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        overflow: hidden;
      }
      .rail .eyebrow {
        color: var(--color-gold-11);
      }
      .rail h2 {
        font-family: var(--font-display);
        font-size: var(--text-7);
        font-weight: 500;
        line-height: 1.05;
        margin-top: 6px;
      }
      .rail .when {
        color: var(--color-text-muted);
        font-size: var(--text-2);
        margin-top: 8px;
      }
      .facts {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        border-top: 1px dashed var(--color-border-dashed);
        border-bottom: 1px dashed var(--color-border-dashed);
      }
      .fact {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 14px 6px;
      }
      .fact + .fact {
        border-left: 1px dashed var(--color-border-dashed);
        padding-left: 14px;
      }
      .fact .k {
        color: var(--color-text-subtle);
      }
      .fact .v {
        font-family: var(--font-mono);
        font-size: var(--text-5);
      }
      .section-label {
        color: var(--color-text-subtle);
        display: block;
        margin-bottom: 14px;
      }
      .foot {
        margin-top: auto;
      }
      .btn {
        width: 100%;
        font-family: var(--font-sans);
        font-size: var(--text-2);
        font-weight: 500;
        padding: 10px 16px;
        border-radius: var(--radius-3);
        border: 1px solid var(--color-border-strong);
        background: var(--color-panel);
        color: var(--color-text);
      }
      .grow-hint {
        font-size: var(--text-1);
        color: var(--color-text-subtle);
        text-align: center;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="panel">
        <div class="toolbar">
          <span class="title">Sunday, at the kitchen table</span>
          <span class="done"><span class="check">✓</span>Solved</span>
        </div>
        <div class="board-stage">
          <div class="board-fit" id="board"></div>
        </div>
      </div>

      <div class="rail">
        <div>
          <span class="caps eyebrow">Solved together</span>
          <h2>Sunday, at the kitchen table</h2>
          <div class="when">Finished March 9 · five hands</div>
        </div>

        <div class="facts">
          <div class="fact">
            <span class="caps k">Time</span><span class="v">41:12</span>
          </div>
          <div class="fact">
            <span class="caps k">Solvers</span><span class="v">5</span>
          </div>
          <div class="fact">
            <span class="caps k">Entries</span><span class="v">214</span>
          </div>
        </div>

        <div>
          <span class="caps section-label">Who filled what</span>
          <div id="ledger"></div>
        </div>

        <div class="foot">
          <button class="btn">Copy link to this board</button>
          <div class="grow-hint">Your shared record. It stays.</div>
        </div>
      </div>
    </div>

    <script src="./mosaic-lib.js"></script>
    <script>
      const grid = Mosaic.loadGrid();
      // The settled memory: a quiet tint (about a third strength), ink kept, so the board
      // reads as a normal solved board first and an attribution map second.
      const board = Mosaic.renderBoard(grid, {
        tint: 0.42,
        ink: true,
        numbers: true,
      });
      document.getElementById("board").appendChild(board);
      document.getElementById("ledger").appendChild(Mosaic.renderLedger(grid));
    </script>
  </body>
</html>
