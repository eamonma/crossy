<!doctype html>
<!--
  Direction A, frame 1: THE COMPLETION MOMENT.
  The web parity beat for iOS's tint-hold-settle mosaic. On the last correct cell the
  board holds at full attribution tint (every letter washed in its writer's roster
  color), a restrained confetti drift plays over it in the room's colors, and the summary
  card has just morphed up from the frozen timer. Real tokens, real Crossy board, real
  names, real per-cell attribution. Ships on today's data (store carries per-cell `by`).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Crossy — completion moment (A)</title>
    <link rel="stylesheet" href="./tokens.css" />
    <script src="./grid-inline.js"></script>
    <style>
      .stage {
        width: 1440px;
        height: 900px;
        display: grid;
        grid-template-columns: 1fr 340px;
        background: var(--color-background);
        position: relative;
        overflow: hidden;
      }
      /* the solve panel (LiveApp's framed panel) */
      .panel {
        margin: 16px;
        margin-right: 8px;
        background: var(--color-panel);
        border: 1px solid var(--color-border-strong);
        border-radius: var(--radius-3);
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--color-border);
      }
      .toolbar .title {
        font-family: var(--font-display);
        font-size: var(--text-5);
        font-weight: 500;
      }
      .toolbar .timer {
        margin-left: auto;
        font-family: var(--font-mono);
        font-size: var(--text-3);
        color: var(--color-green-11);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .toolbar .check {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: var(--color-green-11);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 11px;
      }
      .board-stage {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 28px;
        min-height: 0;
      }
      .board-fit {
        width: min(100%, calc(15 * 44px));
      }
      .rail {
        margin: 16px;
        margin-left: 8px;
      }

      /* the summary card, morphed up from the timer (LiveApp CompletionOverlay language) */
      .card {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 420px;
        background: var(--color-panel);
        border: 1px solid var(--color-border-strong);
        border-radius: var(--radius-4);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
        z-index: 5;
      }
      .card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 20px 16px;
      }
      .card-eyebrow {
        color: var(--color-gold-11);
      }
      .card-title {
        font-family: var(--font-display);
        font-size: var(--text-6);
        font-weight: 500;
        margin-top: 4px;
      }
      .divider {
        height: 1px;
        background: var(--color-border);
      }
      .divider-dashed {
        border-top: 1px dashed var(--color-border-dashed);
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        margin: 0;
      }
      .stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 16px 8px;
      }
      .stat + .stat {
        border-left: 1px dashed var(--color-border-dashed);
      }
      .stat dt {
        color: var(--color-text-subtle);
      }
      .stat dd {
        margin: 0;
        font-family: var(--font-mono);
        font-size: var(--text-5);
      }
      .ledger-inline {
        padding: 16px 20px;
      }
      .ledger-inline .caps {
        color: var(--color-text-subtle);
        display: block;
        margin-bottom: 12px;
      }
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 16px 20px;
      }
      .btn {
        font-family: var(--font-sans);
        font-size: var(--text-2);
        font-weight: 500;
        padding: 8px 16px;
        border-radius: var(--radius-3);
        border: 1px solid var(--color-border-strong);
        background: var(--color-panel);
        color: var(--color-text);
      }
      .btn-primary {
        background: var(--color-gold-9);
        border-color: var(--color-gold-9);
        color: #fff;
      }

      canvas.confetti {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div class="stage" id="stage">
      <div class="panel">
        <div class="toolbar">
          <span class="title">Sunday, at the kitchen table</span>
          <span class="timer"><span class="check">✓</span>41:12</span>
        </div>
        <div class="board-stage">
          <div class="board-fit" id="board"></div>
        </div>
      </div>
      <div class="rail"></div>

      <canvas class="confetti" id="confetti"></canvas>

      <div class="card">
        <div class="card-head">
          <div>
            <span class="caps card-eyebrow">Solved together</span>
            <div class="card-title">Sunday, at the kitchen table</div>
          </div>
          <div class="stack" id="cardStack"></div>
        </div>
        <div class="divider"></div>
        <dl class="stats">
          <div class="stat">
            <dt class="caps">Time</dt>
            <dd>41:12</dd>
          </div>
          <div class="stat">
            <dt class="caps">Solvers</dt>
            <dd>5</dd>
          </div>
          <div class="stat">
            <dt class="caps">Entries</dt>
            <dd>214</dd>
          </div>
        </dl>
        <div class="divider"></div>
        <div class="ledger-inline">
          <span class="caps">Who filled what</span>
          <div id="ledger"></div>
        </div>
        <div class="divider"></div>
        <div class="actions">
          <button class="btn">Copy link</button>
          <button class="btn btn-primary">Back to home</button>
        </div>
      </div>
    </div>

    <script src="./mosaic-lib.js"></script>
    <script>
      const grid = Mosaic.loadGrid();
      // The moment: full mosaic tint, ink letters kept (the live board's own glyphs).
      const board = Mosaic.renderBoard(grid, {
        tint: 1,
        ink: true,
        numbers: true,
      });
      document.getElementById("board").appendChild(board);
      document
        .getElementById("ledger")
        .appendChild(Mosaic.renderLedger(grid, { compact: true }));

      // avatar stack for the card
      const order = grid.solvers;
      const stack = document.getElementById("cardStack");
      for (const s of order) {
        const p = document.createElement("span");
        p.className = "puck";
        p.style.background = s.color;
        p.textContent = s.name[0];
        stack.appendChild(p);
      }

      // Confetti: the existing Completion.tsx drift, roster colors, drawn at one instant.
      (function () {
        const canvas = document.getElementById("confetti");
        const w = 1440,
          h = 900;
        const dpr = 2;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";
        const ctx = canvas.getContext("2d");
        ctx.scale(dpr, dpr);
        const base = ["#978365", "#b9a88d", "#cbc0a8", "#e1dccf"];
        const people = grid.solvers.map((s) => s.color);
        const colors = [...base, ...people, ...people];
        let seed = 20260712;
        const rand = (a, b) => {
          seed = (seed * 1103515245 + 12345) & 0x7fffffff;
          return a + (seed / 0x7fffffff) * (b - a);
        };
        const count = 260;
        // freeze the drift mid-fall so a still frame reads as weather, not a start line
        const elapsed = 1.55;
        for (let i = 0; i < count; i++) {
          const x0 = rand(-20, w + 20),
            drift = rand(-14, 14),
            delay = rand(0, 0.9);
          const fall = rand(2.4, 3.6),
            sway = rand(6, 26),
            swayRate = rand(1.6, 3.4);
          const phase = rand(0, Math.PI * 2),
            rot0 = rand(0, Math.PI * 2),
            spin = rand(-3, 3);
          const size = rand(5, 10),
            color = colors[Math.floor(rand(0, colors.length))];
          const t = elapsed - delay;
          if (t < 0 || t > fall) continue;
          const p = t / fall;
          const y = -24 + (h + 48) * (0.55 * p + 0.45 * p * p);
          const x = x0 + drift * t + sway * Math.sin(swayRate * t + phase);
          const alpha =
            Math.min(1, t / 0.25) * Math.max(0, Math.min(1, (1 - p) / 0.2));
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rot0 + spin * t);
          ctx.globalAlpha = alpha;
          ctx.fillStyle = color;
          ctx.fillRect(-size / 2, -size * 0.3, size, size * 0.6);
          ctx.restore();
        }
      })();
    </script>
  </body>
</html>
