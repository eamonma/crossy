name: CI

# Push runs only on main (post-merge, the golden history the deploy pipeline keys off);
# every branch gets CI through its PR. Unscoped push would double-run each PR update.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: lint + typecheck + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      # `pnpm test` includes packages/db's Testcontainers Postgres migration test
      # (DESIGN.md §11). ubuntu-latest ships a running Docker daemon, so it runs in
      # this job; it fails loudly (never skips) if Docker is absent. Kept in the
      # single job on purpose: at this scaffold stage there is exactly one such test,
      # and a second job would duplicate checkout + install for no isolation gain.
      - run: pnpm test
      - run: pnpm format:check

  smoke:
    name: M1 Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Cache the downloaded Chromium binary keyed on the pinned @playwright/test version
      # (pnpm-lock.yaml) plus OS. Hit: skip the ~100MB browser download, still run
      # `install-deps` (apt) separately below since that installs to system paths outside
      # this cache and is fast (no download, just package installs already in apt's cache).
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      # Chromium plus its OS libraries; the harness stands up real api + session +
      # Testcontainers Postgres and drives two real pages (ubuntu-latest ships Docker).
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @crossy/e2e exec playwright install --with-deps chromium
      # Cache hit: browser binary already present, but OS deps (apt packages) aren't part
      # of the cached path, so install those alone (fast: no download, no browser fetch).
      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @crossy/e2e exec playwright install-deps chromium
      # Builds the web client, then runs the two M1 scenarios. Kept a separate job (not in
      # `pnpm test`) because it needs a browser and a build step; failing here is an M1 gate.
      - run: pnpm smoke
